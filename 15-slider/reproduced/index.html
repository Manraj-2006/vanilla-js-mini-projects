<!DOCTYPE html>
<html>
<head>
  <title>Slider</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="slider-container">

    <div class="slide">
      <img src="./img-1.jpeg" class="slide-img">
      <h1>Slide 1</h1>
    </div>

    <div class="slide">
      <h1>Slide 2</h1>
    </div>

    <div class="slide">
      <h1>Slide 3</h1>
    </div>

    <div class="slide">
      <div>
        <img src="./person-1.jpeg" class="person-img">
        <h4>John Doe</h4>
        <h1>Slide 4</h1>
      </div>
    </div>

  </div>

  <div class="btn-container">
    <button class="prevBtn">Previous</button>
    <button class="nextBtn">Next</button>
  </div>

  <script src="app.js"></script>

</body>
</html>
