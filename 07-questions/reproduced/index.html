<!DOCTYPE html>
<html>
<head>
  <title>Q & A</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
  >

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <section class="questions">

    <div class="title">
      <h2>General Questions</h2>
    </div>

    <div class="section-center">

      <!-- Question 1 -->
      <article class="question">
        <div class="question-title">
          <p>Do you accept credit cards?</p>

          <button class="question-btn">
            <span class="plus-icon">
              <i class="far fa-plus-square"></i>
            </span>

            <span class="minus-icon">
              <i class="far fa-minus-square"></i>
            </span>
          </button>
        </div>

        <div class="question-text">
          <p>Yes, we accept all major credit and debit cards.</p>
        </div>
      </article>

      <!-- Question 2 -->
      <article class="question">
        <div class="question-title">
          <p>Do you support local farmers?</p>

          <button class="question-btn">
            <span class="plus-icon">
              <i class="far fa-plus-square"></i>
            </span>

            <span class="minus-icon">
              <i class="far fa-minus-square"></i>
            </span>
          </button>
        </div>

        <div class="question-text">
          <p>Yes, we buy fresh produce from local farmers whenever possible.</p>
        </div>
      </article>

      <!-- Question 3 -->
      <article class="question">
        <div class="question-title">
          <p>Do you use organic ingredients?</p>

          <button class="question-btn">
            <span class="plus-icon">
              <i class="far fa-plus-square"></i>
            </span>

            <span class="minus-icon">
              <i class="far fa-minus-square"></i>
            </span>
          </button>
        </div>

        <div class="question-text">
          <p>Yes, many of our ingredients are organic and freshly sourced.</p>
        </div>
      </article>

    </div>

  </section>

  <script src="app.js"></script>

</body>
</html>
